services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/app
      DATABASE_URL_SYNC: postgresql://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      # For development convenience:
      UVICORN_RELOAD: "true"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      # NEW: mount the whole backend repo so Alembic files, migrations, etc. persist on your host
      - ./backend:/app
      # NEW: keep the Linux venv created by uv safe from the bind mount
      - api_venv:/app/.venv

  web:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      # Live edit frontend
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    # Important: node_modules should stay inside container (Linux)
    # If you mount the whole frontend folder, you'll often break node_modules on Windows.

volumes:
  db_data:
  api_venv:
